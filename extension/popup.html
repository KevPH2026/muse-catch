<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muse · Catch</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">
  <div class="header">
    <span class="logo">🌀 Muse</span>
    <span class="tagline">灵感捕手</span>
  </div>

  <div class="card" id="current-page">
    <div class="card-label">📍 当前页面</div>
    <div class="page-title" id="page-title">—</div>
    <div class="page-url" id="page-url">—</div>
  </div>

  <div class="form-group">
    <label for="selected-text">✂️ 选中文字 <span class="hint">（自动获取）</span></label>
    <textarea id="selected-text" rows="3" placeholder="在页面上选中文字后打开插件…"></textarea>
  </div>

  <div class="form-group">
    <label for="user-note">💭 我的想法</label>
    <textarea id="user-note" rows="2" placeholder="为什么这条值得记…（可选）"></textarea>
  </div>

  <div class="form-group">
    <label>🏷️ 标签</label>
    <div class="tags" id="quick-tags">
      <span class="tag" data-tag="inspiration">灵感</span>
      <span class="tag" data-tag="product">产品</span>
      <span class="tag" data-tag="tech">技术</span>
      <span class="tag" data-tag="business">商业</span>
      <span class="tag" data-tag="ai">AI</span>
      <span class="tag" data-tag="todo">待办</span>
    </div>
  </div>

  <button class="capture-btn" id="capture-btn">
    <span class="btn-icon">⚡</span> 捕获灵感
  </button>

  <div class="status" id="status"></div>

  <div class="footer">
    <button class="settings-btn" id="settings-btn">⚙️ API 设置</button>
  </div>

  <div class="settings-panel" id="settings-panel" style="display:none;">
    <input type="text" id="api-url" placeholder="Muse API 地址">
    <button class="save-btn" id="save-settings">保存</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
